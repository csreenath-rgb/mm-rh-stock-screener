name: Refresh Universe Lists

# Manually triggered: regenerates data/universes/{sp500,nasdaq100,dow}.csv from the
# public Wikipedia constituent tables and commits them. Run whenever indices change.
on:
  workflow_dispatch:

concurrency:
  group: refresh-universes
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the commit can rebase onto latest main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt lxml

      - name: Refresh index constituent lists
        run: python scripts/refresh_universes.py

      - name: Commit and push updated CSVs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add data/universes/*.csv

          if git diff --staged --quiet; then
            echo "No universe changes to commit"
            exit 0
          fi

          git commit -m "data: refresh index constituent lists ($(date +%Y-%m-%d))"

          # Robust push: tolerate main moving during the run (same pattern as the daily job)
          BRANCH="${GITHUB_REF#refs/heads/}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${BRANCH}"; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto latest origin/${BRANCH}"
            git fetch origin "${BRANCH}"
            if ! git rebase "origin/${BRANCH}"; then
              git rebase --abort || true
              echo "Rebase conflict; aborting"
              exit 1
            fi
            sleep $(( (RANDOM % 6) + 3 ))
          done
          echo "Push failed after 5 attempts"
          exit 1
